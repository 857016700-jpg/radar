<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共享雷达车使用说明</title>

<style>
body {
    margin: 0;
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #d6e4ff, #f3d1ff);
}

/* 容器 */
.container {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* 标题 */
.title {
    font-size: 28px;
    font-weight: bold;
    display: flex;
    align-items: center;
}

.title span {
    margin-left: 10px;
}

/* 二维码 */
.qr {
    text-align: center;
    margin: 20px 0;
}

.qr img {
    width: 260px;   /* 👈 这里已经帮你放大了 */
    max-width: 90%;
    border-radius: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* 高亮 */
.highlight {
    background: #ffeaa7;
    padding: 4px 8px;
    border-radius: 6px;
    font-weight: bold;
}

/* 列表 */
ul {
    padding-left: 20px;
}

li {
    margin: 8px 0;
}

/* 注意事项 */
.warning {
    background: #ffe5e5;
}

/* 手机优化 */
@media (max-width: 600px) {
    .title {
        font-size: 22px;
    }

    .qr img {
        width: 220px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="title">📞 <span>客服联系方式</span></div>

        <p>有任何问题，请通过以下方式联系客服：</p>
        <p>微信客服：扫描下方二维码添加（请备注“雷达车”）</p>

        <div class="qr">
            <img src="2.jpg" alt="客服二维码">
            <p>（客服微信二维码）</p>
        </div>

        <p>
            下单后，请将您的 
            <span class="highlight">游戏组队码</span> 
            发给客服，客服会回复您雷达共享地址。
        </p>
    </div>

    <div class="card">
        <div class="title">✨ <span>服务简介</span></div>
        <ul>
            <li>无需开辅助，由我们提供共享雷达</li>
            <li>可查看附近50米露天物资</li>
            <li>人物全图可见</li>
            <li>运行稳定，安全性高</li>
        </ul>
    </div>

    <div class="card warning">
        <div class="title">⚠️ <span>重要注意事项</span></div>
        <ul>
            <li>游戏主机不要打开网页，请用手机或iPad</li>
            <li>不要使用游戏麦</li>
            <li>不要开排位</li>
            <li>不要匹配野队友</li>
            <li>有问题及时联系客服</li>
        </ul>
    </div>

</div>

</body>
</html>
